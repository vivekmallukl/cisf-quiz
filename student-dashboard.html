
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CISF ASTI DELHI EXAM PORTAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>CISF ASTI DELHI EXAM PORTAL</h1>
    </header>

    <div class="airport-marquee">
        <div class="marquee-content">✈️ IGI AIRPORT NEW DELHI - CISF ASTI ✈️</div>
    </div>

    <div class="portal-container" style="max-width: 450px; margin-top: 60px;">
        <h2 style="text-align: center; color: #0b3c5d;">Student Access Panel</h2>
        <hr><br>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="studentUser" placeholder="Enter assigned username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="studentPass" placeholder="Enter password">
        </div>
        
        <button style="width: 100%;" onclick="loginStudent()">Access Dashboard</button>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="admin-login.html" style="color: #328cc1; font-weight: bold; text-decoration: none;">Go to Admin Portal →</a>
        </div>
    </div>

    <footer>
        created and developed by Vivek R ,ALL RIGHTS RESERVED 2026
    </footer>

    <script>
        function loginStudent() {
    const usernameInput = document.getElementById('studentUser').value.trim();
    const passwordInput = document.getElementById('studentPass').value.trim();

    // Pull the CSV provisioned student database
    const studentDatabase = JSON.parse(localStorage.getItem('studentDatabase')) || [];

    // Verify if student credentials match
    const foundStudent = studentDatabase.find(s => s.username === usernameInput && s.password === passwordInput);

    if (foundStudent) {
        // 🌟 CRUCIAL: This line saves the exact username into browser memory!
        localStorage.setItem('currentStudent', usernameInput);
        
        // Redirect to dashboard
        window.location.href = "student-dashboard.html";
    } else {
        alert("Invalid Student Credentials. Please try again.");
    }
}
    </script>
</body>
</html>
