<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Learning Workspace - CISF ASTI</title>
    <style>
        :root { --brand: #1e3a8a; --accent: #2563eb; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1100px; margin: 0 auto; }
        .user-header { background: var(--brand); color: white; padding: 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .alert-banner { background: #fef3c7; border-left: 6px solid #f59e0b; padding: 15px; border-radius: 8px; margin: 20px 0; color: #92400e; font-weight: 500; }
        .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; color: var(--brand); display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f8fafc; padding-bottom: 10px; }
        .action-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 10px; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 14px; border-radius: 5px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-logout { background: #ef4444; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="user-header">
        <div>
            <h1 id="sName" style="margin:0; font-size: 24px;">Welcome, Trainee</h1>
            <p id="sMeta" style="margin: 5px 0 0 0; opacity: 0.8; font-size: 14px;">Section: Basic AVSEC</p>
        </div>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>

    <!-- LIVE INSTRUCTION BANNER -->
    <div class="alert-banner" id="instructionBox">
        🔔 <strong>Notice:</strong> Loading current announcements...
    </div>

    <div class="section-grid">
        <!-- QUIZZES -->
        <div class="card">
            <h3>📝 Available Quizzes</h3>
            <div id="quizContainer"><p>Loading...</p></div>
        </div>

        <!-- STUDY MATERIALS -->
        <div class="card">
            <h3>📁 Study Materials (Drive)</h3>
            <div id="materialContainer"><p>Loading...</p></div>
        </div>

        <!-- GOOGLE FORMS -->
        <div class="card">
            <h3>📋 Google Forms & Surveys</h3>
            <div id="formContainer"><p>Loading...</p></div>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0OSqbAQpuLJqVbQFPw6c-AgJtZdOWMR9wkrn5CY8uvfgt87O9kF-xt0fFu8AYO0w/exec";
    const SPREADSHEET_ID = localStorage.getItem('globalSpreadsheetId') || "1q94opoGzIWQGcRz1fD1BJz1HODEE1_wUh3KxGTQtArk";
    const userSection = (localStorage.getItem('studentSectionContext') || 'basic').toLowerCase();

    window.onload = () => {
        document.getElementById('sName').innerText = localStorage.getItem('currentStudent') || "Trainee";
        document.getElementById('sMeta').innerText = `Designation: ${localStorage.getItem('currentDesignation') || 'N/A'} | Section: ${userSection.toUpperCase()}`;
        loadDashboardContent();
    };

    async function apiCall(data) {
        data.spreadsheetId = SPREADSHEET_ID;
        let res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
        return await res.json();
    }

    async function loadDashboardContent() {
    // 1 Single API Call instead of 4 sequential calls
    let data = await apiCall({ action: "loadDashboardData" });

    // 1. Render Instructions
    let currentInst = (data.instructions || []).find(i => (i.section || '').toLowerCase() === userSection);
    document.getElementById('instructionBox').innerHTML = currentInst 
        ? `📢 <strong>Notice (${currentInst.updatedAt}):</strong> ${currentInst.message}`
        : `📢 <strong>Notice:</strong> No active announcements.`;

    // 2. Render Quizzes
    renderItems('quizContainer', (data.quizzes || []).filter(q => (q.section || 'basic').toLowerCase() === userSection), q => `
        <div class="action-item">
            <div><strong>${q.quizTitle}</strong><br><small>${q.durationMinutes || 30} Mins</small></div>
            <button class="btn" onclick="launchQuiz('${q.quizUrl}', '${q.quizTitle}')">Start Test</button>
        </div>`);

    // 3. Render Drive Materials
    renderItems('materialContainer', (data.materials || []).filter(m => (m.section || 'basic').toLowerCase() === userSection), m => `
        <div class="action-item">
            <div><strong>${m.title}</strong></div>
            <a href="${m.driveUrl}" target="_blank" class="btn" style="background:#10b981;">Open Drive</a>
        </div>`);

    // 4. Render Forms
    renderItems('formContainer', (data.forms || []).filter(f => (f.section || 'basic').toLowerCase() === userSection), f => `
        <div class="action-item">
            <div><strong>${f.formTitle}</strong></div>
            <a href="${f.formUrl}" target="_blank" class="btn" style="background:#8b5cf6;">Open Form</a>
        </div>`);
}

    function renderItems(containerId, list, templateFn) {
        const container = document.getElementById(containerId);
        container.innerHTML = list.length ? list.map(templateFn).join('') : '<small>Nothing assigned yet.</small>';
    }

    function launchQuiz(url, title) {
    const username = encodeURIComponent(localStorage.getItem('currentUsername') || '');
    const studentName = encodeURIComponent(localStorage.getItem('currentStudent') || '');
    const designation = encodeURIComponent(localStorage.getItem('currentDesignation') || '');
    const section = encodeURIComponent(localStorage.getItem('studentSectionContext') || '');

    const fullUrl = `${url}?username=${username}&studentName=${studentName}&designation=${designation}&section=${section}`;
    window.open(fullUrl, "_blank");
}

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
