<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CISF ASTI DELHI EXAM PORTAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CISF ASTI DELHI EXAM PORTAL</h1>
    </header>

    <div class="portal-container" style="max-width: 450px; margin-top: 60px; background: rgba(255, 255, 255, 0.95);">
        <div class="form-group">
            <label>Student Username</label>
            <input type="text" id="studentUser">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="studentPass">
        </div>
        
        <button style="width: 100%;" onclick="loginStudent()">Access Dashboard</button>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="admin-login.html" style="color: #328cc1; font-weight: bold; text-decoration: none;">Go to Admin Panel →</a>
        </div>
    </div>

    <footer>
        created and developed by Vivek R ,ALL RIGHTS RESERVED 2026
    </footer>

    <script>
        async function loginStudent() {
            const usernameInput = document.getElementById('studentUser').value.trim();
            const passwordInput = document.getElementById('studentPass').value.trim();
            
            // Loading indicator (optional: add a spinner element in HTML)
            alert("Logging in, please wait...");

            try {
                // 1. Fetch the user database from your Google Apps Script Web App
                const response = await fetch('https://script.google.com/macros/s/AKfycbwAa3Zpx7dJqLgrXYCNJrv96PxOoO2cOM-hdgaVLAc4IJ3hA0CQK-0yrKvCFUPrebkgzQ/exec');
                const studentDatabase = await response.json();

                // 2. Validate credentials
                const foundStudent = studentDatabase.find(s => 
                    s.username === usernameInput && s.password === passwordInput
                );

                if (foundStudent) {
                    // 3. Save session info locally so the dashboard knows who is logged in
                    localStorage.setItem('currentStudent', usernameInput);
                    localStorage.setItem('studentSectionContext', foundStudent.section || 'basic');
                    
                    window.location.href = "student-dashboard.html";
                } else {
                    alert("Invalid Student Credentials. Please try again.");
                }
            } catch (error) {
                console.error("Connection error:", error);
                alert("Unable to connect to the central server. Please check your internet connection.");
            }
        }
    </script>
</body>
</html>
