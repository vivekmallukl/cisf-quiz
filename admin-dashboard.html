<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal - CISF ASTI</title>
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #2563eb; 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --text: #1e293b; 
            --danger: #dc2626;
            --success: #16a34a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 90px; }
        .header-bar { background: var(--primary); color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; font-weight: bold; border: none; background: #e2e8f0; color: #475569; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: var(--accent); color: white; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; font-size: 16px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; color: var(--primary); }
        input, textarea, button { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box; }
        button.btn-primary { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .scroll-list { max-height: 180px; overflow-y: auto; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 5px; }
        .item-row { display: flex; justify-content: space-between; padding: 6px; background: #f8fafc; margin-bottom: 4px; border-radius: 4px; font-size: 13px; }
        
        /* BOTTOM MOST ACTION FOOTER BAR */
        .bottom-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            border-top: 2px solid #e2e8f0;
            padding: 15px 30px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-sizing: border-box;
            z-index: 1000;
        }
        .btn-save-exit {
            background-color: var(--danger);
            color: white;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s ease;
        }
        .btn-save-exit:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h2>CISF ASTI DELHI - Administrative Control Console</h2>
    <input type="text" id="globalSpreadsheetId" placeholder="Spreadsheet ID..." style="width: 300px; margin: 0;" onchange="saveSheetId(this.value)">
</div>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-basic" onclick="switchSection('basic')">📚 Basic AVSEC Channel</button>
    <button class="tab-btn" id="btn-screener" onclick="switchSection('screener')">🛡️ Screener Channel</button>
</div>

<div class="grid-container">
    <!-- BROADCAST INSTRUCTIONS -->
    <div class="card" style="grid-column: span 2;">
        <h3>📢 Broadcast Live Instructions to Trainees</h3>
        <textarea id="instructionText" rows="3" placeholder="Enter important instructions, exam rules, or announcements here..."></textarea>
        <button class="btn-primary" onclick="broadcastInstruction()">Post Announcement</button>
    </div>

    <!-- QUIZZES -->
    <div class="card">
        <h3>1. GitHub Quizzes</h3>
        <input type="text" id="qTitle" placeholder="Quiz Title">
        <input type="text" id="qUrl" placeholder="GitHub Pages URL">
        <input type="number" id="qTime" placeholder="Duration (Mins)">
        <button class="btn-primary" onclick="addQuiz()">Publish Quiz</button>
        <div id="quizList" class="scroll-list"></div>
    </div>

    <!-- STUDY MATERIALS -->
    <div class="card">
        <h3>2. Study Materials (Google Drive)</h3>
        <input type="text" id="mTitle" placeholder="Document / Module Name">
        <input type="text" id="mUrl" placeholder="Google Drive Link">
        <button class="btn-primary" onclick="addMaterial()">Share Material</button>
        <div id="materialList" class="scroll-list"></div>
    </div>

    <!-- GOOGLE FORMS -->
    <div class="card">
        <h3>3. Google Forms / Surveys</h3>
        <input type="text" id="fTitle" placeholder="Form Name / Feedback Title">
        <input type="text" id="fUrl" placeholder="Google Form Link">
        <button class="btn-primary" onclick="addForm()">Link Form</button>
        <div id="formList" class="scroll-list"></div>
    </div>
</div>

<!-- BOTTOM-MOST SAVE & EXIT BAR -->
<div class="bottom-action-bar">
    <button class="btn-save-exit" onclick="saveAndExitPortal()">
        💾 Save & Exit Admin Dashboard
    </button>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0OSqbAQpuLJqVbQFPw6c-AgJtZdOWMR9wkrn5CY8uvfgt87O9kF-xt0fFu8AYO0w/exec";
    let SPREADSHEET_ID = localStorage.getItem('globalSpreadsheetId') || "1q94opoGzIWQGcRz1fD1BJz1HODEE1_wUh3KxGTQtArk";
    let activeSection = 'basic';

    window.onload = () => {
        document.getElementById('globalSpreadsheetId').value = SPREADSHEET_ID;
        loadAllData();
    };

    function saveSheetId(val) {
        SPREADSHEET_ID = val.trim();
        localStorage.setItem('globalSpreadsheetId', SPREADSHEET_ID);
        loadAllData();
    }

    function switchSection(sec) {
        activeSection = sec;
        document.getElementById('btn-basic').classList.toggle('active', sec === 'basic');
        document.getElementById('btn-screener').classList.toggle('active', sec === 'screener');
        loadAllData();
    }

    async function apiCall(data) {
        data.spreadsheetId = SPREADSHEET_ID;
        let res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
        return await res.json();
    }

    async function loadAllData() {
        let quizzes = await apiCall({ action: "loadData", key: "Quizzes" });
        let materials = await apiCall({ action: "loadData", key: "Materials" });
        let forms = await apiCall({ action: "loadData", key: "Forms" });

        renderList('quizList', quizzes.filter(x => x.section === activeSection), 'quizTitle');
        renderList('materialList', materials.filter(x => x.section === activeSection), 'title');
        renderList('formList', forms.filter(x => x.section === activeSection), 'formTitle');
    }

    function renderList(elemId, list, key) {
        document.getElementById(elemId).innerHTML = list.map(i => `<div class="item-row"><span>${i[key]}</span></div>`).join('') || '<small>No records.</small>';
    }

    async function broadcastInstruction() {
        let msg = document.getElementById('instructionText').value.trim();
        if(!msg) return alert("Write an instruction.");
        await apiCall({ action: "saveInstruction", section: activeSection, message: msg });
        alert("Instruction posted!");
        document.getElementById('instructionText').value = "";
    }

    async function addQuiz() {
        let quizzes = await apiCall({ action: "loadData", key: "Quizzes" });
        quizzes.push({ quizId: 'q_' + Date.now(), quizTitle: document.getElementById('qTitle').value, quizUrl: document.getElementById('qUrl').value, durationMinutes: document.getElementById('qTime').value, section: activeSection });
        await apiCall({ action: "saveData", key: "Quizzes", data: quizzes });
        loadAllData();
    }

    async function addMaterial() {
        let materials = await apiCall({ action: "loadData", key: "Materials" });
        materials.push({ materialId: 'm_' + Date.now(), title: document.getElementById('mTitle').value, driveUrl: document.getElementById('mUrl').value, section: activeSection });
        await apiCall({ action: "saveData", key: "Materials", data: materials });
        loadAllData();
    }

    async function addForm() {
        let forms = await apiCall({ action: "loadData", key: "Forms" });
        forms.push({ formId: 'f_' + Date.now(), formTitle: document.getElementById('fTitle').value, formUrl: document.getElementById('fUrl').value, section: activeSection });
        await apiCall({ action: "saveData", key: "Forms", data: forms });
        loadAllData();
    }

    // SAVE & EXIT HANDLER
    function saveAndExitPortal() {
        const currentSheetId = document.getElementById('globalSpreadsheetId').value.trim();
        if (currentSheetId) {
            localStorage.setItem('globalSpreadsheetId', currentSheetId);
        }
        
        alert("Configurations saved successfully. Logging out of Admin Workspace...");
        
        // Clear admin session variables if any
        localStorage.removeItem('adminRole');
        
        // Redirect to Login Page
        window.location.href = "index.html";
    }
</script>
</body>
</html>
